<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Portfolio | Daniel Rodier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">DANIEL RODIER</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="resume.html">Resume</a>
            <a href="portfolio.html">Portfolio</a>
        </div>
    </nav>

    <div class="container">
        <div id="list-view">
            <a href="portfolio.html" style="color: var(--accent); text-decoration: none; font-weight: bold;">&larr; Back to All Categories</a>
            <h1 id="cat-title" style="margin-top: 1rem;"></h1>
            <div id="scripts-list"></div>
        </div>

        <div id="detail-view" style="display:none;">
            <button class="btn" style="background: var(--surface-color); border: 1px solid var(--border); margin-bottom: 2rem;" onclick="backToList()">&larr; Back to List</button>
            
            <div class="page-header">
                <h1 id="script-title"></h1>
                <a id="download-link" href="#" download class="btn">Download File</a>
            </div>

            <div class="doc-container">
                <iframe id="preview-frame" src=""></iframe>
            </div>
        </div>
    </div>

    <script>
        const scriptData = {
            'PSA': [{ title: 'NTSB: No Texting', file: 'NTSB_No_Texting_-_PSA.docx' }],
            'Ad': [
                { title: 'HTA: Newlyweds', file: 'Newlyweds_-_30_Second_Ad.docx' },
                { title: 'HTA: College Students', file: 'College_-_30_Second_Ad.docx' },
                { title: 'HTA: Parents with Kids', file: 'Parents_with_Kids_-_30_Second_Ad.docx' },
                { title: 'HTA: Retirees', file: 'Retirees_-_30_Second_Ad.docx' }
            ],
            'News': [
                { title: 'WSIE: Radio Modernization', file: 'WSIE_News_Package.doc' },
                { title: 'NACE: Starleague Finals', file: 'NACE_News_Package.docx' }
            ],
            'Show': [{ title: 'Global Village: Episode 4', file: 'GV_SP_2025_Episode_4.docx' }]
        };

        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');

        function init() {
            if (cat && scriptData[cat]) {
                const titles = { 'PSA': 'Public Service Announcements', 'Ad': '30-Second Advertisements', 'News': 'News Packages', 'Show': 'Student Created Shows' };
                document.getElementById('cat-title').innerText = titles[cat] || cat;
                const list = document.getElementById('scripts-list');
                list.innerHTML = ''; 
                scriptData[cat].forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'bar-item';
                    item.innerHTML = `<h3>${s.title}</h3><p>View Script Preview</p>`;
                    item.onclick = () => showDetail(s);
                    list.appendChild(item);
                });
            } else {
                window.location.href = 'portfolio.html';
            }
        }

        function showDetail(s) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            document.getElementById('script-title').innerText = s.title;
            document.getElementById('download-link').href = s.file;

            // Using the Google Viewer URL structure
            const fileUrl = window.location.origin + '/' + s.file;
            document.getElementById('preview-frame').src = `https://docs.google.com/gview?url=${fileUrl}&embedded=true`;
            window.scrollTo(0,0);
        }

        function backToList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('preview-frame').src = ""; 
            window.scrollTo(0,0);
        }

        init();
    </script>
<footer>
    <div class="footer-grid">
        <div class="footer-column">
            <a href="#" class="logo">PORTFOLIO</a>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 1rem;">
                Building digital experiences with a focus on clean code and functional design.
            </p>
        </div>

        <div class="footer-column contact">
            <h4 style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--accent);">NAVIGATION</h4>
            <div class="nav-links" style="display: flex; flex-direction: column; gap: 10px;">
                <a href="#work" style="margin: 0;">Work</a>
                <a href="#about" style="margin: 0;">About</a>
                <a href="#contact" style="margin: 0;">Contact</a>
            </div>
        </div>

        <div class="footer-column socials">
            <h4 style="margin-bottom: 1rem; font-size: 0.9rem; color: var(--accent);">CONNECT</h4>
            
            <div class="footer-card" onclick="copyEmail()">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <span>hello@yourdomain.com</span>
            </div>

            <a href="https://linkedin.com" class="footer-card" target="_blank">
                <svg viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79M6.88 8.56a1.68 1.68 0 0 0 1.68-1.68c0-.93-.75-1.69-1.68-1.69a1.69 1.69 0 0 0-1.69 1.69c0 .93.76 1.68 1.69 1.68m1.39 9.94v-8.37H5.5v8.37h2.77z"/></svg>
                <span>LinkedIn</span>
            </a>
        </div>
    </div>

    <div class="copyright">
        &copy; 2026 Your Name. All rights reserved.
    </div>
</footer>

<div id="copy-message">Email address copied!</div>

<script>
function copyEmail() {
    const email = "hello@yourdomain.com"; // Change to your actual email
    const popup = document.getElementById('copy-message');

    navigator.clipboard.writeText(email).then(() => {
        // Show the popup
        popup.style.display = 'block';

        // Hide after 2 seconds
        setTimeout(() => {
            popup.style.display = 'none';
        }, 2000);
    }).catch(err => {
        console.error('Could not copy text: ', err);
    });
}
</script>
</body>
</html>
