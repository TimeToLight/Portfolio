        const params = new URLSearchParams(window.location.search);
        const cat = params.get('cat');

        function init() {
            if (cat && scriptData[cat]) {
                const titles = { 'PSA': 'Public Service Announcements', 'Ad': '30-Second Advertisements', 'News': 'News Packages', 'Show': 'Student Created Shows' };
                document.getElementById('cat-title').innerText = titles[cat] || cat;
                const list = document.getElementById('scripts-list');
                list.innerHTML = ''; 

                scriptData[cat].forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'bar-item';
                    item.innerHTML = `<h3>${s.title}</h3>`; // Back to clean titles only!
                    item.onclick = () => showDetail(s);
                    list.appendChild(item);
                });
            } else {
                window.location.href = 'portfolio.html';
            }
        }

        function showDetail(s) {
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('detail-view').style.display = 'block';
    
    document.getElementById('script-title').innerText = s.title;
    document.getElementById('download-link').href = s.file;
    
    // Set the description text
    const descText = document.getElementById('script-description');
    descText.innerText = s.desc || "Technical breakdown for this script is currently being updated.";

    const watchLink = document.getElementById('watch-link');
    const narrativeBox = document.getElementById('script-narrative');

    // Toggle the "Watch" button and the layout class
    if (s.videoUrl) {
        watchLink.href = s.videoUrl;
        watchLink.style.display = 'inline-block';
        narrativeBox.classList.add('has-video'); // Apply the restriction
    } else {
        watchLink.style.display = 'none';
        narrativeBox.classList.remove('has-video'); // Remove the restriction
    }

    const fileUrl = window.location.origin + '/' + s.file;
    document.getElementById('preview-frame').src = `https://docs.google.com/gview?url=${fileUrl}&embedded=true`;
    window.scrollTo(0,0);
}

        function backToList() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            document.getElementById('preview-frame').src = ""; 
            window.scrollTo(0,0);
        }

        init();
    </script>

    <div id="copy-toast">Email address copied!</div>
    
    <script>
        function copyEmail() {
            const email = "TTL.Casts@gmail.com";
            // Check for clipboard API support
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(email).then(showToast);
            } else {
                // Fallback for older browsers
                const textArea = document.createElement("textarea");
                textArea.value = email;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { 
                    document.execCommand('copy'); 
                    showToast(); 
                } catch (err) { 
                    console.error('Copy failed', err); 
                }
                document.body.removeChild(textArea);
            }
        }

        function showToast() {
            const toast = document.getElementById("copy-toast");
            toast.className = "show"; // Use className to ensure it replaces previous state
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2500);
        }
    </script>
