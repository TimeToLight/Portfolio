    <div id="copy-toast">Email address copied!</div>
    
    <script>
        function copyEmail() {
            const email = "TTL.Casts@gmail.com";
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(email).then(showToast);
            } else {
                const textArea = document.createElement("textarea");
                textArea.value = email;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try { document.execCommand('copy'); showToast(); } catch (err) { console.error('Copy failed', err); }
                document.body.removeChild(textArea);
            }
        }

        function showToast() {
            const toast = document.getElementById("copy-toast");
            toast.classList.add("show");
            setTimeout(() => { toast.classList.remove("show"); }, 2500);
        }
    </script>
